<ion-toolbar>

</ion-toolbar>
<ion-content [fullscreen]="true">
    @if (cardExibir != -1) {
        <ion-card>
            <img alt="Silhouette of mountains" [src]="fakeStore[cardExibir].image" />
            <ion-card-header>
                <ion-card-title>{{ fakeStore[cardExibir].title }}</ion-card-title>
                <ion-card-subtitle>Preço ${{ fakeStore[cardExibir].price }}</ion-card-subtitle>
            </ion-card-header>

            <ion-card-content>
                {{ fakeStore[cardExibir].description }}
            </ion-card-content>
            <div class="buttonsGui">
                <ion-button fill="clear" (click)="backCard()"><i class="bi bi-arrow-left-circle"></i></ion-button>
                <ion-card-title>{{ fakeStore[cardExibir].id }}</ion-card-title>
                <ion-button fill="clear" (click)="nextCard()"><i class="bi bi-arrow-right-circle"></i></ion-button>
            </div>
        </ion-card>
    } @else {
        <ion-progress-bar type="indeterminate"></ion-progress-bar>
        <div class="errorLoad">
            <i class="bi bi-cloud-drizzle"></i>
            <h1>Não foi possível carregar a pagina!</h1>
        </div>
    }
</ion-content>
